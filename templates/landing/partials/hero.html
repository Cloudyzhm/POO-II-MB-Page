<section class="relative pt-16 pb-32 md:pt-24 md:pb-48 flex flex-col items-center justify-center bg-brand-black z-10 overflow-hidden isolate">
    <div class="absolute inset-0 -z-10 pointer-events-none flex items-center justify-center opacity-100">
        <svg viewBox="-200 -200 1840 1400" preserveAspectRatio="none" class="absolute w-[150%] h-[150%] md:w-[120%] md:h-[120%] overflow-visible">
             <path d="M-200,600 C400,1000 1000,500 1640,800" fill="none" stroke="#e60000" stroke-width="260" class="animate-swoosh-1 opacity-50" />
             <path d="M1640,200 C1000,600 600,900 -200,1100" fill="none" stroke="#e60000" stroke-width="220" class="animate-swoosh-1 opacity-40" style="animation-delay: -5s;" />
             <path d="M-200,300 C400,700 1000,200 1640,500" fill="none" stroke="#ffffff" stroke-width="70" class="animate-swoosh-2 opacity-90" />
             <path d="M1640,0 C1000,400 600,600 -200,900" fill="none" stroke="#ffffff" stroke-width="60" class="animate-swoosh-2 opacity-80" style="animation-delay: -7s;" />
        </svg>
    </div>
    <div class="absolute bottom-0 left-0 w-full h-24 md:h-40 bg-gradient-to-t from-brand-black via-brand-black/60 to-transparent -z-10 pointer-events-none"></div>
    <div class="relative z-10 w-full max-w-5xl mx-auto px-4 flex flex-col items-center">
        <div class="text-center mb-12" data-aos="fade-up">
            <h1 class="text-5xl md:text-7xl font-black text-white mb-6 leading-tight italic tracking-tighter drop-shadow-lg">
                ¿Dónde quieres <span class="text-brand-red">viajar?</span>
            </h1>
        </div>
        <div class="w-full bg-white rounded-[2rem] shadow-float p-3 md:p-4" data-aos="fade-up" data-aos-delay="100">
            <div class="flex flex-wrap md:flex-nowrap bg-gray-100 p-1.5 rounded-2xl text-sm font-semibold mb-4 overflow-hidden">
                <button id="tab-compra" onclick="activateTab('compra')" class="flex-1 py-3 px-4 bg-white text-brand-red border-b-[3px] border-brand-red shadow-sm rounded-xl flex items-center justify-center gap-2 transition-all outline-none transform scale-100">
                    <i class="fa-solid fa-ticket"></i> <span class="hidden md:inline">Compra tu pasaje</span><span class="md:hidden">Comprar</span>
                </button>
                <button id="tab-anula" onclick="activateTab('anula')" class="flex-1 py-3 px-4 text-gray-500 hover:text-brand-black border-b-[3px] border-transparent rounded-xl flex items-center justify-center gap-2 transition-all outline-none">
                    <i class="fa-solid fa-ban"></i> <span class="hidden md:inline">Anula tu pasaje</span><span class="md:hidden">Anular</span>
                </button>
            </div>
            <div class="px-2 pb-2 pt-2 md:px-4 md:pb-4 min-h-[100px] flex items-center">
                <div id="panel-compra" class="w-full block animate-fade-in">
                    <form action="{% url 'search_routes' %}" method="GET" class="flex flex-col lg:flex-row items-center gap-3">
                        <div class="flex-1 w-full bg-gray-50 border border-gray-200 rounded-2xl p-3 focus-within:ring-2 focus-within:ring-brand-red/30 focus-within:border-brand-red transition-all relative">
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wide mb-1">Origen</label>
                            <div class="flex items-center">
                                <i class="fa-regular fa-circle-dot text-brand-red mr-3"></i>
                                <select name="origin" id="origen-compra" class="w-full bg-transparent focus:outline-none text-brand-black font-bold appearance-none cursor-pointer">
                                    <option value="" disabled {% if not search_origin %}selected{% endif %}>Selecciona origen</option>
                                    {% for town in towns %}
                                        <option value="{{ town.id }}" {% if search_origin and search_origin.id == town.id %}selected{% endif %}>{{ town.name }}</option>
                                    {% endfor %}
                                </select>
                                <i class="fa-solid fa-chevron-down text-gray-400 text-xs absolute right-4 pointer-events-none"></i>
                            </div>
                        </div>
                        <div class="hidden lg:flex items-center justify-center">
                            <button type="button" onclick="swapDestinations('origen-compra', 'destino-compra', this)" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-brand-red hover:bg-brand-red hover:text-white transition-colors outline-none shadow-sm group">
                                <i class="fa-solid fa-right-left group-hover:scale-110 transition-transform"></i>
                            </button>
                        </div>
                        <div class="flex-1 w-full bg-gray-50 border border-gray-200 rounded-2xl p-3 focus-within:ring-2 focus-within:ring-brand-red/30 focus-within:border-brand-red transition-all relative">
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wide mb-1">Destino</label>
                            <div class="flex items-center">
                                <i class="fa-solid fa-location-dot text-brand-black mr-3"></i>
                                <select name="destination" id="destino-compra" class="w-full bg-transparent focus:outline-none text-brand-black font-bold appearance-none cursor-pointer">
                                    <option value="" disabled {% if not search_destination %}selected{% endif %}>Selecciona destino</option>
                                    {% for town in towns %}
                                        <option value="{{ town.id }}" {% if search_destination and search_destination.id == town.id %}selected{% endif %}>{{ town.name }}</option>
                                    {% endfor %}
                                </select>
                                <i class="fa-solid fa-chevron-down text-gray-400 text-xs absolute right-4 pointer-events-none"></i>
                            </div>
                        </div>
                        <div class="flex-1 w-full bg-gray-50 border border-gray-200 rounded-2xl p-3 focus-within:ring-2 focus-within:ring-brand-red/30 focus-within:border-brand-red transition-all relative">
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wide mb-1">Fecha</label>
                            <div class="flex items-center">
                                <i class="fa-regular fa-calendar text-gray-500 mr-3"></i>
                                <input type="date" name="date" id="fecha-compra" value="{{ search_date|default:'' }}" class="w-full bg-transparent focus:outline-none text-brand-black font-bold cursor-pointer">
                            </div>
                        </div>
                        <div class="w-full lg:w-auto mt-2 lg:mt-0">
                            <button type="submit" class="w-full lg:w-auto h-full min-h-[60px] bg-brand-red hover:bg-brand-darkred text-white px-10 font-black tracking-widest transition-colors rounded-2xl shadow-md flex items-center justify-center">
                                BUSCAR
                            </button>
                        </div>
                    </form>
                </div>
                <div id="panel-anula" class="w-full hidden animate-fade-in">
                    <form action="{% url 'cancel_ticket' %}" method="POST" class="flex flex-col lg:flex-row items-center gap-3">
                        {% csrf_token %}
                        <div class="flex-1 w-full bg-gray-50 border border-gray-200 rounded-2xl p-3 focus-within:ring-2 focus-within:ring-brand-black/20 focus-within:border-brand-black transition-all">
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wide mb-1">N° de Boleto a Anular</label>
                            <div class="flex items-center">
                                <i class="fa-solid fa-ban text-gray-500 mr-3"></i>
                                <input type="text" name="ticket_code" placeholder="Ej: MGB-000001" class="w-full bg-transparent focus:outline-none text-brand-black font-bold">
                            </div>
                        </div>
                        <div class="w-full lg:w-auto mt-2 lg:mt-0">
                            <button type="submit" class="w-full lg:w-auto h-full min-h-[60px] bg-brand-black hover:bg-brand-dark text-white px-10 font-black tracking-widest transition-colors rounded-2xl shadow-md flex items-center justify-center">
                                ANULAR
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<div class="w-full relative z-20 -mt-1 bg-brand-gray">
    <svg viewBox="0 0 1440 120" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-16 md:h-28 object-cover" preserveAspectRatio="none">
        <path d="M0 0H1440V120H0V0Z" fill="#0a0a0a"/>
        <path d="M0 120C0 120 400 0 1440 0V120H0Z" fill="#e60000"/>
        <path d="M0 120C0 120 400 15 1440 15V120H0Z" fill="#ffffff"/>
        <path d="M0 120C0 120 400 25 1440 25V120H0Z" fill="#f5f5f5"/>
    </svg>
</div>
