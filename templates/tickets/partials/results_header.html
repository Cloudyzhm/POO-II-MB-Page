<section class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm relative overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-1 bg-brand-red"></div>
    <div class="max-w-5xl mx-auto px-4 py-5 flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="flex items-center gap-4 w-full md:w-auto">
            <div class="w-12 h-12 bg-brand-gray rounded-full flex items-center justify-center text-brand-black flex-shrink-0 border-2 border-gray-100">
                <i class="fa-solid fa-map-location-dot text-xl"></i>
            </div>
            <div>
                <h1 class="font-black text-xl md:text-2xl flex items-center gap-3 tracking-tight uppercase italic text-brand-black">
                    {{ search_origin.name }} <i class="fa-solid fa-arrow-right text-brand-red text-sm"></i> {{ search_destination.name }}
                </h1>
                <p class="text-[11px] font-bold text-gray-500 uppercase tracking-widest mt-1 flex items-center">
                    <i class="fa-regular fa-calendar text-brand-red mr-1.5"></i> {{ search_date }} • {{ results|length }} recorrido{{ results|length|pluralize:'s' }}
                </p>
            </div>
        </div>
        <a href="{% url 'home' %}" class="flex items-center gap-2 text-xs font-bold text-gray-300 hover:text-white transition-colors uppercase tracking-wider bg-brand-black hover:bg-brand-dark px-4 py-2 rounded-full outline-none whitespace-nowrap">
            <i class="fa-solid fa-arrow-left"></i> <span class="hidden sm:inline">Modificar Búsqueda</span>
        </a>
    </div>
</section>
